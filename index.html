<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
 background:radial-gradient(1000px 600px at 70% -10%,rgba(63,122,78,.25),transparent 60%),
 radial-gradient(800px 500px at 10% 110%,rgba(192,112,63,.18),transparent 60%),#23311f;color:#f6f1e7;padding:24px}
.box{background:rgba(255,253,247,.06);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(14px);
 border-radius:24px;padding:46px 40px;max-width:430px;width:100%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.leaf{width:54px;height:54px;margin:0 auto 18px;border-radius:50%;background:linear-gradient(135deg,#3f7a4e,#c0703f);
 display:flex;align-items:center;justify-content:center;font-size:1.5rem}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.5rem;margin-bottom:6px}
.sub{font-size:.9rem;color:#cdd5c4;margin-bottom:26px}
.ey{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#d79a6f;font-weight:600;margin-bottom:14px}
input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.2);
 color:#fff;font-size:1rem;text-align:center;letter-spacing:.05em;outline:none;transition:.2s}
input:focus{border-color:#c0703f;background:rgba(0,0,0,.3)}
button{width:100%;margin-top:14px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#3f7a4e,#2f5d3a);
 color:#fff;font-weight:600;font-size:.98rem;cursor:pointer;transition:.2s;font-family:'Inter'}
button:hover{filter:brightness(1.08)}button:disabled{opacity:.6;cursor:wait}
.err{color:#f0a890;font-size:.82rem;margin-top:14px;min-height:18px}
.shake{animation:sh .4s}
@keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.foot{margin-top:24px;font-size:.72rem;color:#9aa893}
</style></head>
<body>
<div class="box">
  <div class="leaf">🌿</div>
  <div class="ey">Confidencial</div>
  <h1>Vila da Criança Farm</h1>
  <div class="sub">Estudo de Viabilidade · acesso restrito</div>
  <form id="f">
    <input id="pw" type="password" placeholder="Senha de acesso" autocomplete="off" autofocus>
    <button id="b" type="submit">Acessar o estudo</button>
    <div class="err" id="e"></div>
  </form>

const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function dec(pw){
  const enc=new TextEncoder();
  const bk=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(P.salt),iterations:P.it,hash:'SHA-256'},
     bk,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(P.iv)},key,b64d(P.ct));
  return new TextDecoder().decode(pt);
}
const f=document.getElementById('f'),pw=document.getElementById('pw'),e=document.getElementById('e'),b=document.getElementById('b'),box=document.querySelector('.box');
f.addEventListener('submit',async ev=>{
  ev.preventDefault();e.textContent='';b.disabled=true;b.textContent='Verificando…';
  try{
    const html=await dec(pw.value);
    document.open();document.write(html);document.close();
  }catch(err){
    b.disabled=false;b.textContent='Acessar o estudo';
    e.textContent='Senha incorreta. Tente novamente.';
    box.classList.remove('shake');void box.offsetWidth;box.classList.add('shake');
    pw.value='';pw.focus();
  }
});
